<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INDForge</title>

  <!-- Load order matters: dayjs must be defined before antd UMD evaluates,
       otherwise antd throws during init and never sets window.antd. -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"
          onerror="window.__indforgePush && window.__indforgePush('ERROR','react CDN failed')"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
          onerror="window.__indforgePush && window.__indforgePush('ERROR','react-dom CDN failed')"></script>
  <script src="https://unpkg.com/dayjs@1.11.10/dayjs.min.js"
          onerror="window.__indforgePush && window.__indforgePush('ERROR','dayjs CDN failed')"></script>
  <script src="https://unpkg.com/antd@5.11.2/dist/antd.min.js"
          onerror="window.__indforgePush && window.__indforgePush('ERROR','antd CDN failed')"></script>
  <link href="https://unpkg.com/antd@5.11.2/dist/reset.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://code.highcharts.com/highcharts.js"
          onerror="window.__indforgePush && window.__indforgePush('ERROR','highcharts CDN failed')"></script>
  <!-- Heatmap type is not in base highcharts.js — required for Safety & Tox overlap chart. -->
  <script src="https://code.highcharts.com/modules/heatmap.js"
          onerror="window.__indforgePush && window.__indforgePush('ERROR','highcharts heatmap module failed')"></script>

  <link rel="stylesheet" href="static/styles.css" />
  <link rel="icon" type="image/svg+xml" href="static/icon.svg" />
</head>
<body>
  <div id="root"></div>

  <!-- Boot-time debug panel. Captures errors BEFORE React mounts so
       "nothing loads" cases are still diagnosable. React's debug accordion
       hides this once it takes over. -->
  <div id="boot-debug">
    <div id="boot-debug-header">
      <strong>INDForge boot log</strong>
      <button id="boot-debug-copy" type="button">Copy</button>
      <button id="boot-debug-close" type="button">Hide</button>
    </div>
    <pre id="boot-log"></pre>
  </div>

  <script>
    (function () {
      var logEl = document.getElementById('boot-log');
      window.__indforgeLog = [];
      function stamp() { var d = new Date(); return d.toISOString().split('T')[1].slice(0, 12); }
      function push(level, msg) {
        var line = '[' + stamp() + '] ' + level + ' ' + msg;
        window.__indforgeLog.push({ level: level, msg: msg, time: Date.now() });
        if (logEl) logEl.textContent += line + '\n';
        // Also echo to console for DevTools users
        try { (console[level.toLowerCase()] || console.log)('[INDForge]', msg); } catch (e) {}
      }
      window.__indforgePush = push;

      push('INFO', 'boot script running; UA=' + navigator.userAgent.slice(0, 80));
      push('INFO', 'location=' + window.location.href);

      window.addEventListener('error', function (e) {
        push('ERROR', (e.message || 'error') + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
      });
      window.addEventListener('unhandledrejection', function (e) {
        push('ERROR', 'unhandledrejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });

      // Probe vendor libs after they should be loaded
      window.addEventListener('load', function () {
        push('INFO', 'window load event fired');
        push('INFO', 'React=' + (typeof React !== 'undefined' ? React.version : 'MISSING'));
        push('INFO', 'ReactDOM=' + (typeof ReactDOM !== 'undefined' ? 'ok' : 'MISSING'));
        push('INFO', 'antd=' + (typeof antd !== 'undefined' ? 'ok' : 'MISSING'));
        push('INFO', 'Highcharts=' + (typeof Highcharts !== 'undefined' ? 'ok' : 'MISSING'));
        push('INFO', 'MOCK_CANDIDATES=' + (typeof MOCK_CANDIDATES !== 'undefined' ? MOCK_CANDIDATES.length + ' rows' : 'MISSING'));
        setTimeout(function () {
          var root = document.getElementById('root');
          push('INFO', 'root children after 400ms = ' + (root ? root.childElementCount : 'no root'));
        }, 400);
      });

      document.getElementById('boot-debug-close').addEventListener('click', function () {
        document.getElementById('boot-debug').style.display = 'none';
      });
      document.getElementById('boot-debug-copy').addEventListener('click', function () {
        var txt = logEl.textContent;
        navigator.clipboard.writeText(txt).then(function () {
          document.getElementById('boot-debug-copy').textContent = 'Copied';
          setTimeout(function () { document.getElementById('boot-debug-copy').textContent = 'Copy'; }, 1500);
        });
      });
    })();
  </script>

  <script src="static/mock_data.js" onerror="window.__indforgePush('ERROR','mock_data.js failed to load')"></script>
  <script src="static/dose_math.js" onerror="window.__indforgePush('ERROR','dose_math.js failed to load')"></script>
  <script src="static/app.js" onerror="window.__indforgePush('ERROR','app.js failed to load')"></script>
</body>
</html>
